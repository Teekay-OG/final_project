<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NLP - Emotion Detection</title>
</head>
<body>
    <h1>NLP - Emotion Detection</h1>

    <form action="/detect_emotion" method="POST">
        <label for="text">Please enter the text to be analyzed</label><br>
        
        <!-- ✅ FIXED NAME -->
        <input type="text" id="text" name="text_to_analyse">
        
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h3>Result of Emotion Detection</h3>
        
        <!-- ✅ FIXED DISPLAY -->
        <p>{{ result }}</p>
    {% endif %}
</body>
</html>
